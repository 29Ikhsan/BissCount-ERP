version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: aksia_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: aksia
    ports:
      - "5432:5432"
    volumes:
      - aksia_pgdata:/var/lib/postgresql/data

volumes:
  aksia_pgdata:
